services:

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    networks:
      - prestashop_network

  prestashop:
    container_name: prestashop
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ARG_UID: ${ENV_UID:-1000}
        ARG_GID: ${ENV_GID:-1000}
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8080:80"
#      - 443:443

    environment:
      DB_SERVER: dev_db
      DB_NAME: prestashop
      DB_USER: root
      DB_PASSWD: asdf

#      PS_ENABLE_SSL: 1
#      PS_LANGUAGE	Change the default language installed with PrestaShop	en
#      PS_COUNTRY	Change the default country installed with PrestaShop	GB
      PS_ALL_LANGUAGES: 1 # Install all the existing languages for the current version

#      ADMIN_MAIL	Override default admin email	demo@prestashop.com
#      ADMIN_PASSWD	Override default admin password	prestashop_demo

#      PS_DEV_MODE: 1

#      PS_FOLDER_ADMIN 	Change the name of the admin folder 	admin

      # auto-install with test data
      # http://localhost:8080 with the front office containing the demo products and http://localhost:8080/admin for the back office.
      PS_INSTALL_AUTO: 1
      PS_DOMAIN: localhost:8080
#      PS_ERASE_DB: 1
      PS_INSTALL_DB: 1

      # value in PhpStorm Settings/PHP/Servers; useful when debugging CLI scripts from within the container, not from PhpStorm
      PHP_IDE_CONFIG: "serverName=prestashop.local"

    volumes:
      - ./src:/var/www/html
      - ./xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      - type: bind
        source: ./modules/prestashop/packetery # local path to the module
        target: /var/www/html/modules/packetery # path to be mounted in the container
      - type: bind
        source: ./modules/prestashop
        target: /var/www/packetery-dev

    networks:
      - prestashop_network

  mysql:
    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
    container_name: dev_db
    image: mariadb:12
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: prestashop
      MARIADB_ROOT_PASSWORD: asdf
      TZ: Europe/Prague
    volumes:
      - ./db:/var/lib/mysql
    ports:
      - 3308:3306
    networks:
      - prestashop_network

#  mysql:
#    user: "${CURRENT_UID:-1000}:${CURRENT_GID:-1000}"
#    container_name: dev_db
#    image: mysql:5.7
#    restart: unless-stopped
#    environment:
#      MYSQL_DATABASE: prestashop
#      MYSQL_ROOT_PASSWORD: asdf
#      TZ: Europe/Prague
#    volumes:
#      - ./db:/var/lib/mysql
#    ports:
#      - 3308:3306
#    networks:
#      - prestashop_network

#    # this enables logging all queries to a file in the db directory - comment out this whole line to disable
#    command: mysqld --general-log=1 --general-log-file=general-log.log

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - ./mailpit:/data
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - prestashop_network

networks:
  prestashop_network:
