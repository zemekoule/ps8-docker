# Sdílená vždy-běžící infra: traefik (routing podle hostname), mysql (schéma per
# verze), adminer, mailpit. PS verze se přidávají přes compose.<tag>.yml
# (skládá se přes -f, viz Makefile / bin/). PS služby NEpublikují porty — routuje Traefik.
services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --entryPoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [prestashop_network]

  mysql:
    container_name: dev_db
    image: mariadb:12
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: asdf
      TZ: Europe/Prague
    volumes:
      - ./db:/var/lib/mysql
    ports:
      - "3308:3306"
    networks: [prestashop_network]

  adminer:
    image: adminer
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks: [prestashop_network]

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    restart: unless-stopped
    volumes:
      - ./mailpit:/data
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks: [prestashop_network]

networks:
  prestashop_network:
    name: prestashop_network
